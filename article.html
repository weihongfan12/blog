<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - 我的博客</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="js/dataManager.js"></script>
    <script type="module" src="js/articleManager.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <h1>我的博客</h1>
            <nav>
                <a href="index.html">首页</a>
                <a href="science-networking.html">科学上网</a>
                <a href="about.html">关于</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="post-detail">
            <div id="post-content">
                <p>加载中...</p>
            </div>
            <a href="index.html" class="back-link">← 返回首页</a>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 我的博客. 保留所有权利.</p>
        </div>
    </footer>

    <script type="module">
        import articleManager from './js/articleManager.js';
        
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');
            
            if (articleId) {
                await articleManager.loadArticleDetail(articleId);
            } else {
                document.querySelector('#post-content').innerHTML = '<p>文章不存在</p>';
            }
        });
    </script>
</body>
</html>
